<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Nudge icon concept D — Fingertip Dot">
  <title>Nudge — Fingertip Dot</title>
  <!-- off-white bg -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="#ffffff"/>
  <!-- very soft teal halo to suggest tap response (no shadow) -->
  <circle cx="512" cy="440" r="220" fill="#ccfbf1"/>
  <circle cx="512" cy="440" r="140" fill="#5eead4"/>
  <!-- the dot itself -->
  <circle cx="512" cy="440" r="82" fill="#0d9488"/>
  <!-- baseline guide as very thin line, far below — suggests "surface" to tap -->
  <rect x="280" y="780" width="464" height="4" rx="2" ry="2" fill="#e2e8f0"/>
</svg>
